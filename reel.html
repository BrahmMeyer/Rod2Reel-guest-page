<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Reel — Rod2Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --gold: #F5A623; --gold-dark: #C4841A; --bg: #080808; --surface: #111111; --surface2: #1A1A1A; --border: #222222; --text: #FFFFFF; --muted: #666666; --subtle: #333333; --ocean-blue: #0047AB; --ocean-dark: #003380; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
.header { position: relative; padding: 32px 24px 24px; text-align: center; background: linear-gradient(180deg, #0f0f0f 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); overflow: hidden; }
.header::before { content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%); pointer-events: none; }
.charter-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 8vw, 52px); letter-spacing: 2px; color: var(--text); line-height: 1; margin-bottom: 6px; text-shadow: 0 0 40px rgba(245,166,35,0.2); }
.tagline { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }
.gold-line { width: 40px; height: 2px; background: var(--gold); margin: 16px auto 0; }
.content { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }
.video-wrap { position: relative; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border); display: none; }
.video-wrap video { width: 100%; display: block; }
.video-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(245,166,35,0.3); color: var(--gold); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 5px 10px; border-radius: 20px; }
.btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

/* Uniform Button Base Style */
.btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 24px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: all 0.2s ease; letter-spacing: 0.3px; }

/* Review Button: Gold with Bold Text matching Download style */
.btn-review { background: var(--gold); color: #000; margin-bottom: 10px; }
.btn-review:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,166,35,0.3); }

/* Download Button: Ocean Blue matching Review style */
.btn-download { background: var(--ocean-blue); color: var(--text); margin-top: 20px; margin-bottom: 24px; }
.btn-download:hover { background: var(--ocean-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 71, 171, 0.4); }

.btn-icon { font-size: 18px; }
.social-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 8px; display: none; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.post-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
.post-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); opacity: 0; transition: opacity 0.2s ease; }
.post-card:hover { border-color: var(--subtle); transform: translateX(3px); }
.post-card:hover::before { opacity: 1; }
.post-text { font-size: 14px; line-height: 1.6; color: #CCCCCC; margin-bottom: 8px; }
.copy-row { display: flex; align-items: center; justify-content: space-between; }
.copy-hint { font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
.copy-icon { font-size: 14px; filter: brightness(10); }

.logo-section { text-align: center; padding: 8px 0 8px; display: none; margin-top: 0; }
.logo-section img { max-width: 624px; max-height: 312px; object-fit: contain; opacity: 0.9; filter: brightness(1.2) drop-shadow(0 0 20px rgba(245,166,35,0.6)); }
.footer { text-align: center; padding: 20px; color: var(--gold); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
.loading-state { text-align: center; padding: 60px 24px; }
.fish-emoji { font-size: 48px; display: block; margin-bottom: 16px; animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.loading-text { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--muted); }
.fade-in { animation: fadeIn 0.6s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="header">
    <div class="charter-name" id="charterName"></div>
    <div class="tagline" id="tagline">Your Reel is ready!</div>
    <div class="gold-line"></div>
</div>
<div class="content">
    <div class="loading-state" id="loadingState">
        <span class="fish-emoji"></span>
        <div class="loading-text">Loading your reel...</div>
    </div>
    <div class="video-wrap" id="videoWrap">
        <div class="video-badge">Your Reel</div>
        <video id="mainVideo" controls playsinline preload="metadata"></video>
    </div>
    
    <div class="btn-group" id="btnGroup" style="display:none;">
        <a id="reviewBtn" href="#" class="btn btn-review" style="display:none;" target="_blank">
            <span class="btn-icon">⭐</span> Leave Us a Review
        </a>
    </div>

    <div class="social-section" id="socialSection">
        <div class="section-label">Your Social Captions</div>
        <div class="post-card" onclick="copyPost('post1txt','toast1')">
            <div class="post-text" id="post1txt"></div>
            <div class="copy-row">
                <span class="copy-hint" id="toast1">Tap to copy</span>
                <span class="copy-icon">📋</span>
            </div>
        </div>
        <div class="post-card" onclick="copyPost('post2txt','toast2')">
            <div class="post-text" id="post2txt"></div>
            <div class="copy-row">
                <span class="copy-hint" id="toast2">Tap to copy</span>
                <span class="copy-icon">📋</span>
            </div>
        </div>
        <div class="post-card" onclick="copyPost('post3txt','toast3')">
            <div class="post-text" id="post3txt"></div>
            <div class="copy-row">
                <span class="copy-hint" id="toast3">Tap to copy</span>
                <span class="copy-icon">📋</span>
            </div>
        </div>
    </div>

    <a id="downloadBtn" href="#" class="btn btn-download" style="display:none;" onclick="downloadVideo(this.href); return false;">
        <span class="btn-icon">⬇️</span> Download My Reel
    </a>

    <div class="logo-section" id="logoSection">
        <img id="charterLogo" src="" alt="Charter Logo"/>
    </div>

    <div class="footer">
        <div style="color:#F5A623;font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Powered by Rod2Reel</div>
        <div style="color:#ffffff;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">Marketing on Steroids</div>
        <div style="color:#ffffff;font-size:11px;letter-spacing:1px;margin-bottom:4px;">www.rod2reel.com</div>
        <div style="color:#ffffff;font-size:11px;letter-spacing:1px;">hello@rod2reel.com</div>
    </div>
</div>

<script>
function copyPost(textId, toastId) {
    const text = document.getElementById(textId).innerText;
    const toast = document.getElementById(toastId);
    navigator.clipboard.writeText(text).then(function() {
        toast.innerText = '✓ Copied!';
        toast.style.color = '#F5A623';
        setTimeout(function() { toast.innerText = 'Tap to copy'; toast.style.color = ''; }, 2000);
    }).catch(function() {
        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        toast.innerText = '✓ Copied!'; setTimeout(function() { toast.innerText = 'Tap to copy'; }, 2000);
    });
}
function downloadVideo(url) {
    fetch(url).then(response => response.blob()).then(blob => {
        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = blobUrl; a.download = 'my-reel.mp4';
        document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(blobUrl);
    }).catch(() => { window.open(url, '_blank'); });
}
function getParam(name) {
    const val = new URLSearchParams(window.location.search).get(name);
    return val ? decodeURIComponent(val) : '';
}
window.onload = function() {
    const name = getParam('name');
    const videoUrl = getParam('video');
    const logo = getParam('logo');
    const review = getParam('review');
    const post1 = getParam('post1');
    const post2 = getParam('post2');
    const post3 = getParam('post3');
    document.getElementById('loadingState').style.display = 'none';
    if (name) {
        document.getElementById('charterName').innerText = name;
        document.title = name + ' — Your Reel';
    } else {
        document.getElementById('charterName').innerText = 'Your Reel';
    }
    if (videoUrl) {
        document.getElementById('mainVideo').src = videoUrl;
        document.getElementById('videoWrap').style.display = 'block';
        document.getElementById('videoWrap').classList.add('fade-in');
        document.getElementById('downloadBtn').href = videoUrl;
        document.getElementById('downloadBtn').style.display = 'flex';
        document.getElementById('btnGroup').style.display = 'flex';
    }
    if (review) {
        document.getElementById('reviewBtn').href = review;
        document.getElementById('reviewBtn').style.display = 'flex';
    }
    if (post1 || post2 || post3) {
        document.getElementById('socialSection').style.display = 'block';
        document.getElementById('socialSection').classList.add('fade-in');
        document.getElementById('post1txt').innerText = post1;
        document.getElementById('post2txt').innerText = post2;
        document.getElementById('post3txt').innerText = post3;
    }
    if (logo) {
        document.getElementById('charterLogo').src = logo;
        document.getElementById('logoSection').style.display = 'block';
    }
};
</script>
</body>
</html>
