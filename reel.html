<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Fishing Reel — Rod2Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5A623;
    --gold-dark: #C4841A;
    --bg: #080808;
    --surface: #111111;
    --surface2: #1A1A1A;
    --border: #222222;
    --text: #FFFFFF;
    --muted: #666666;
    --subtle: #333333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    position: relative;
    padding: 32px 24px 24px;
    text-align: center;
    background: linear-gradient(180deg, #0f0f0f 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .charter-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(245,166,35,0.2);
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .gold-line {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 16px auto 0;
  }

  .content {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  .video-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    margin-bottom: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    display: none;
  }

  .video-wrap video {
    width: 100%;
    display: block;
  }

  .video-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--gold);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 20px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 24px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .btn-review {
    background: var(--gold);
    color: #000;
  }

  .btn-review:hover {
    background: var(--gold-dark);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(245,166,35,0.3);
  }

  .btn-download {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-download:hover {
    background: var(--subtle);
    transform: translateY(-1px);
  }

  .btn-icon {
    font-size: 18px;
  }

  .social-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 8px;
    display: none;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .post-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .post-text {
    font-size: 14px;
    line-height: 1.6;
    color: #CCCCCC;
    margin-bottom: 8px;
  }

  .copy-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .copy-hint {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .copy-icon {
    font-size: 14px;
  }

  .logo-section {
    text-align: center;
    padding: 8px 0 8px;
    display: none;
    border-top: 1px solid var(--border);
  }

  .logo-section img {
    max-width: 624px;
    max-height: 312px;
    object-fit: contain;
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .loading-state {
    text-align: center;
    padding: 60px 24px;
  }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="charter-name" id="charterName"></div>
  <div class="tagline">Your highlight reel is ready</div>
  <div class="gold-line"></div>
</div>

<div class="content">

  <div class="loading-state">
    <span class="fish-emoji"></span>
    <div class="loading-text">Loading your reel...</div>
  </div>

  <div class="video-wrap" id="videoWrap">
    <div class="video-badge">Your Reel</div>
    <video id="mainVideo" controls></video>
  </div>

  <div class="btn-group">
    <a class="btn btn-review">Leave Us a Review — 30 Seconds</a>
    <a class="btn btn-download">Download My Reel</a>
  </div>

  <div class="social-section">
    <div class="section-label">📲 Your Social Captions</div>
  </div>

  <div class="footer">
    <div>Powered by Rod2Reel</div>
    <div>Charter Marketing on Steroids</div>
  </div>

</div>

</body>
</html>
